<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Astro Vault — The Galaxy is Your Portfolio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- Starfield -->
<div id="starfield"></div>

<div id="app">

  <!-- ═══ SIDEBAR ═══ -->
  <div id="sidebar">

    <div class="logo-wrap">
      <div>
        <div class="logo-name">ASTRO VAULT</div>
        <div class="logo-vessel">> INTERSTELLAR FINANCE TERMINAL</div>
        <div class="logo-status">
          <div class="status-dot"></div>
          <span style="font-size:9px;color:#6cb2ff;font-family:'Space Mono',monospace;letter-spacing:1px">GRID_SYNC: ACTIVE</span>
        </div>
      </div>
    </div>

    <div class="pilot-card">
      <div class="pilot-row">
        <div class="pilot-avatar" id="sb-avatar">🧑‍🚀</div>
        <div>
          <div class="pilot-name" id="sb-name">CDR. NOVA</div>
          <div class="pilot-rank" id="sb-rank">SPACE CADET</div>
        </div>
      </div>
      <div class="xp-row">
        <span id="sb-xp-lbl">0 XP</span>
        <span id="sb-xp-nxt">300 to next</span>
      </div>
      <div class="xp-track">
        <div class="xp-fill" id="sb-xp-fill" style="width:0%"></div>
      </div>
      <div class="credits-display">
        <span class="credits-val" id="sb-credits">500 CR</span>
        <span class="credits-label">CREDITS</span>
      </div>
    </div>

    <nav>
      <div class="nav-item active" data-page="galaxy">
        <span class="nav-icon">🌌</span><span>Galaxy Map</span>
      </div>
      <div class="nav-item" data-page="trade">
        <span class="nav-icon">📊</span><span>Trade Node</span>
        <span class="nav-badge live">LIVE</span>
      </div>
      <div class="nav-item" data-page="ship">
        <span class="nav-icon">🚀</span><span>Hangar</span>
      </div>
      <div class="nav-item" data-page="portfolio">
        <span class="nav-icon">🏦</span><span>Portfolio</span>
      </div>
      <div class="nav-item" data-page="missions">
        <span class="nav-icon">⚡</span><span>Missions</span>
      </div>
      <div class="nav-item" data-page="knowledge">
        <span class="nav-icon">🧠</span><span>Knowledge Battle</span>
      </div>
      <div class="nav-item" data-page="profile">
        <span class="nav-icon">👤</span><span>Profile</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div style="font-size:9px;color:#474655;font-family:'Space Mono',monospace;margin-bottom:8px;letter-spacing:1px" id="sb-level">LEVEL 1</div>
      <button class="upgrade-btn" onclick="goPage('profile')">
        ⭐ UPGRADE TO PRO
      </button>
    </div>

  </div><!-- /sidebar -->

  <!-- ═══ MAIN ═══ -->
  <div id="main">
    <div class="page-wrap">
      <div id="screen-galaxy"    class="screen active"></div>
      <div id="screen-trade"     class="screen"></div>
      <div id="screen-ship"      class="screen"></div>
      <div id="screen-portfolio" class="screen"></div>
      <div id="screen-missions"  class="screen"></div>
      <div id="screen-knowledge" class="screen"></div>
      <div id="screen-profile"   class="screen"></div>
    </div>
  </div>

</div><!-- /app -->

<script src="js/core.js"></script>
<script src="js/ui.js"></script>
<script src="js/pages.js"></script>
<script src="js/app.js"></script>

</body>
</html>
